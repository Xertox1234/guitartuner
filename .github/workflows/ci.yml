name: CI

# Cost-shaped CI. macOS runners bill at ~10x Linux, so the heavy day-to-day work
# (the pure-Swift TunerEngine tests + the accuracy benchmark) runs on Linux, and
# the macOS runner is reserved for what genuinely needs it (SwiftUI design-system
# tests + the Xcode app builds) — and only on merges to the integration branch or
# a manual dispatch, not on every PR push. PRs also no longer double-run (push +
# pull_request); push only fires on the integration branch.
on:
  pull_request:
  push:
    branches: [claude/peaceful-mccarthy-LNxPa]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine is pure Swift + Foundation (no SwiftUI/AVFoundation needed for the
  # headless pipeline), so it runs on a 1x Linux runner. This is where the DSP
  # work is gated, so most PRs never touch a macOS runner at all.
  engine:
    name: Engine tests + accuracy benchmark (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Test TunerEngine package
        run: swift test --package-path Packages/TunerEngine

      # Runs the accuracy harness (the published spec is pulled from this log) and
      # fails on regressions (--ci): octave safety + the ratcheted P0/P1 gates.
      - name: Run accuracy benchmark (+ CI gate)
        run: |
          swift run -c release --package-path Packages/TunerEngine Benchmark \
            --compare --out docs/benchmarks --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: docs/benchmarks/
          if-no-files-found: ignore

  # SwiftUI needs macOS, so the design-system tests and the full app builds run
  # here — but only on integration-branch merges and manual dispatch, NOT on every
  # PR, to conserve macOS minutes. When a PR changes app/design-system code, run
  # this on demand via the "Run workflow" (workflow_dispatch) button.
  app:
    name: Design system + app builds (macOS)
    runs-on: macos-14
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      # Pin a known-good Xcode (iOS 17 / macOS 14 SDKs) regardless of runner default.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Compile + run the design-system unit tests (also type-checks all SwiftUI).
      - name: Test design-system package
        run: swift test --package-path Packages/LumaDesignSystem

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Full app compile through Xcode (compiles the package + processes the asset catalog).
      - name: Build app (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build app (macOS)
        run: |
          set -o pipefail
          xcodebuild build \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
