name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # Pin a known-good Xcode (iOS 17 / macOS 14 SDKs) regardless of runner default.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Compile + run the design-system unit tests (also type-checks all SwiftUI).
      - name: Test design-system package
        run: swift test --package-path Packages/LumaDesignSystem

      # Compile + run the TunerEngine DSP tests (synthesized / file input — no
      # audio device needed, so the pipeline + benchmark run headless in CI).
      - name: Test TunerEngine package
        run: swift test --package-path Packages/TunerEngine

      # Run the accuracy benchmark: prints the measured report (the published
      # spec is pulled from this log) and fails on gross regressions (--ci).
      - name: Run accuracy benchmark
        run: |
          swift run -c release --package-path Packages/TunerEngine Benchmark \
            --compare --out docs/benchmarks --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: docs/benchmarks/
          if-no-files-found: ignore

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Full app compile through Xcode (compiles the package + processes the asset catalog).
      - name: Build app (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      - name: Build app (macOS)
        run: |
          set -o pipefail
          xcodebuild build \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO

      # Echo the generated report to the log tail so the measured numbers are
      # readable without artifact-host access (sandbox can't reach blob storage).
      - name: Print accuracy report
        if: always()
        run: |
          echo "===ACCURACY-MD-BEGIN==="
          cat docs/benchmarks/accuracy.md || true
          echo "===ACCURACY-MD-END==="
