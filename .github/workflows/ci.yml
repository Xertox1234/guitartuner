name: CI

# Runs on every push and PR (the repo is public, so Actions minutes are free).
# The pure-Swift engine work is gated on a fast Linux runner; the macOS runner
# carries the SwiftUI design-system tests + full Xcode app builds in parallel.
on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The engine is pure Swift + Foundation (no SwiftUI/AVFoundation needed for the
  # headless pipeline), so it runs on a 1x Linux runner for the fastest DSP gate.
  engine:
    name: Engine tests + accuracy benchmark (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Test TunerEngine package
        run: swift test --package-path Packages/TunerEngine

      # Runs the accuracy harness (the published spec is pulled from this log) and
      # fails on regressions (--ci): octave safety + the ratcheted accuracy gates.
      - name: Run accuracy benchmark (+ CI gate)
        run: |
          swift run -c release --package-path Packages/TunerEngine Benchmark \
            --compare --out docs/benchmarks --ci

      - name: Upload benchmark report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: accuracy-report
          path: docs/benchmarks/
          if-no-files-found: ignore

      # Echo the generated report to the log tail so the measured numbers are
      # readable without artifact-host access (sandbox can't reach blob storage).
      - name: Print accuracy report
        if: always()
        run: |
          echo "===ACCURACY-MD-BEGIN==="
          cat docs/benchmarks/accuracy.md || true
          echo "===ACCURACY-MD-END==="

  # SwiftUI needs macOS, so the design-system tests and the full app builds run here.
  # Runner is macos-15 (not macos-14): its `latest-stable` Xcode tracks close to a
  # current local toolchain, so iOS-only `#if os(iOS)` code written against a newer
  # local SDK doesn't silently break CI on an older one. A macos-14 / Xcode 16.2 gap
  # let an iOS-26-only AVAudioSession symbol (.allowBluetoothHFP) reach main — see #38.
  app:
    name: Design system + app builds (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Pin an explicit Xcode (NOT latest-stable, which floats with the runner image —
      # a green main could go red with no code change). 26.3 is the macos-15 image's
      # current stable and tracks the local toolchain; bump it deliberately via PR.
      # Keep this at or above the team's local Xcode floor so iOS-only `#if os(iOS)`
      # code can't use a symbol newer than CI's SDK. See
      # docs/solutions/best-practices/ios-only-code-ci-sdk-skew-2026-06-16.md
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.3"

      - name: Environment
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Compile + run the design-system unit tests (also type-checks all SwiftUI).
      - name: Test design-system package
        run: swift test --package-path Packages/LumaDesignSystem

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Full app compile through Xcode (compiles the package + processes the asset catalog).
      - name: Build app (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO

      # Build the macOS app AND run the app-layer unit tests. LUMATests is a
      # macOS-hosted bundle (LockGate, LumaAPI.buildURL, and the CacheFile
      # regression guarding the iOS Application Support launch crash). `test`
      # implies `build`, so this keeps the macOS compile gate and adds execution.
      - name: Test app (macOS)
        run: |
          set -o pipefail
          xcodebuild test \
            -project LUMA.xcodeproj \
            -scheme LUMA \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
