# XcodeGen spec — the source of truth for the LUMA app project.
# Generate with:  xcodegen generate   (requires XcodeGen >= 2.39)
# Then open LUMA.xcodeproj. The design system lives in Packages/LumaDesignSystem
# and can also be opened on its own (Package.swift) for previews.
name: LUMA

options:
  bundleIdPrefix: com.luma
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "3442937R38"

packages:
  LumaDesignSystem:
    path: Packages/LumaDesignSystem
  TunerEngine:
    path: Packages/TunerEngine

targets:
  LUMA:
    type: application
    # True SwiftUI multiplatform — one target for iOS + native macOS (not Catalyst).
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
        excludes:
          - "Info.plist"
          - "LUMA.entitlements"
    dependencies:
      - package: LumaDesignSystem
        product: LumaDesignSystem
      # The shared, UI-free DSP engine (Plan 01) — drives the live Tuner screen.
      - package: TunerEngine
        product: TunerEngine
    settings:
      base:
        PRODUCT_NAME: LUMA
        PRODUCT_BUNDLE_IDENTIFIER: com.luma.tuner
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        SUPPORTS_MACCATALYST: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        # macOS native app needs the hardened runtime for distribution.
        ENABLE_HARDENED_RUNTIME: YES
        # App Sandbox + audio-input (macOS App Store / notarization); see the file.
        CODE_SIGN_ENTITLEMENTS: App/LUMA.entitlements

  LUMATests:
    type: bundle.unit-test
    platform: macOS
    sources: LUMA/Tests
    dependencies:
      - target: LUMA
    settings:
      base:
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/LUMA.app/Contents/MacOS/LUMA
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES

# Shared scheme so `xcodebuild -scheme LUMA` works headlessly in CI.
schemes:
  LUMA:
    build:
      targets:
        LUMA: all
        LUMATests: [testing]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LUMATests
    profile:
      config: Release
    archive:
      config: Release
