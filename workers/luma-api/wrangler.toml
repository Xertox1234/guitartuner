name = "luma-api"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "luma"
database_id = "REPLACE_AFTER_wrangler_d1_create"

[vars]
APPLE_BUNDLE_ID = "com.luma.tuner"

# Secrets (set via `wrangler secret put`):
# JWT_SECRET
# RESEND_API_KEY
# RESEND_AUDIENCE_ID
